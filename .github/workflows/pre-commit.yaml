name: Pre-commit Security Checks

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@v6
      with:
        tflint_version: latest

    - name: Install terraform-docs
      run: |
        curl -sSLo ./terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.19.0/terraform-docs-v0.19.0-linux-amd64.tar.gz
        tar -xzf terraform-docs.tar.gz
        chmod +x terraform-docs
        mkdir -p $HOME/.local/bin
        mv terraform-docs $HOME/.local/bin/
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - uses: pre-commit/action@v3.0.1
