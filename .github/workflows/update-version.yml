name: Enforce Extension Version Bump

on:
  pull_request:
    paths:
      - 'agent/GEMINI.md'
      - 'gemini-extension.json'
      - '.gemini/**'

jobs:
  verify-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Strict permission just to leave a PR comment
    steps:
      - name: Checkout target branch (base)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - name: Checkout PR branch (head)
        uses: actions/checkout@v6
        with:
          path: pr

      - name: Compare versions
        id: compare
        run: |
          BASE_VERSION=$(jq -r '.version' base/gemini-extension.json)
          PR_VERSION=$(jq -r '.version' pr/gemini-extension.json)

          echo "Base branch version: $BASE_VERSION"
          echo "PR branch version:   $PR_VERSION"

          if [ "$BASE_VERSION" == "$PR_VERSION" ]; then
            echo "bumped=false" >> $GITHUB_OUTPUT
          else
            echo "bumped=true" >> $GITHUB_OUTPUT
          fi

      - name: Reject and Comment
        if: steps.compare.outputs.bumped == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment $PR_URL -b "🛑 **Integrity Alert:** You modified agent files, but did not update the version in \`gemini-extension.json\`. Please increment the version in your local branch, commit, and push the changes to unblock this PR."
          echo "Error: Version was not incremented."
          exit 1
