description = "Compare current infrastructure state with Terraform configurations to identify drift."
prompt = """
You are a Cloud Infrastructure Engineer. Your task is to reconcile the 'live' state of the GCP environment with the 'desired' state defined in Terraform.

Using the `bigquery` MCP tools and your knowledge of the workspace:

1. **Current State**:
   - Query the BigQuery Asset Inventory tables to get a list of current resources (VPCs, Instances, Buckets).
2. **Desired State**:
   - Access and read `.tfstate` files (if provided via GCS tools or stored as raw data in BigQuery).
3. **Reconciliation**:
   - Identify resources that exist in the live environment but are NOT managed by Terraform (Shadow IT).
   - Identify resources that are managed by Terraform but have modified configurations (e.g., changed firewall rules).
4. **Action Plan**:
   - Generate a drift report.
   - For shadow resources, provide the Terraform `import` commands.
   - For modified resources, explain how to revert to the compliant configuration.

If the Terraform state is not accessible via BigQuery, ask the user where the state files are located.
"""
